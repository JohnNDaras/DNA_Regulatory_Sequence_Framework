seed: 42
device: cuda
task: atac
paths:
  genome_path: data/raw/hg19.pickle
  ctcf_bed_path: data/raw/ENCFF300IYQ.bed.gz
  atac_bed_path: data/raw/ATAC_data.bed.gz
  atac_test_bed_path: data/raw/ATAC_test_regions.bed.gz
  checkpoints_dir: results/checkpoints
  figures_dir: results/figures
  tables_dir: results/tables
  logs_dir: results/logs
data:
  batch_size: 512
  num_workers: 0
  context_length: 256
  include_chr_x_y: false
  n_neg: 3
  min_gap: 2000
  max_tries: 20
  gc_tol: 0.05
  max_N_frac: 0.1
model:
  name: rc_dilated_bigru_gated
  stem_channels: 64
  block_channels: 128
  n_blocks: 6
  kernel_size: 7
  dilations:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 32
  rnn_hidden: 128
  rnn_layers: 1
  hidden_dim: 256
  dropout: 0.15
  n_outputs: 1
  rc_fusion: lse
  lse_temp: 2.0
train:
  epochs: 50
  steps_per_epoch: 300
  patience: 9
  lr: 0.003
